<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background (OS applies its own mask/rounding) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- subtle decorative ring -->
  <circle cx="256" cy="256" r="156" fill="none"
          stroke="#2563EB" stroke-opacity="0.16" stroke-width="16"/>

  <!-- ECG heartbeat line (kept within the maskable safe zone) -->
  <path d="M112 256 H190 l20 -72 30 156 26 -156 20 72 H400"
        fill="none" stroke="url(#pulse)" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
